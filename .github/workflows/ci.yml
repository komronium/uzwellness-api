name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, migrations, tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sanotour
          POSTGRES_PASSWORD: sanotour
          POSTGRES_DB: sanotour_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sanotour -d sanotour_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      UV_CACHE_DIR: /tmp/uv-cache
      DATABASE_URL: postgresql+asyncpg://sanotour:sanotour@localhost:5432/sanotour_test
      TEST_DATABASE_URL: postgresql+asyncpg://sanotour:sanotour@localhost:5432/sanotour_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-only-secret
      RATE_LIMIT_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Compile
        run: python -m compileall app

      - name: Alembic single head
        run: test "$(uv run alembic heads | wc -l)" = "1"

      - name: Tests
        run: uv run pytest
