services:
  app:
    build: .
    container_name: uzwellness-api
    env_file: .env
    network_mode: host
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed &&
             uvicorn app.main:app
               --host 127.0.0.1
               --port 8001
               --proxy-headers
               --forwarded-allow-ips=*"
