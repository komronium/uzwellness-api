services:
  postgres:
    image: postgres:16-alpine
    container_name: uzwellness-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sanotour}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sanotour}
      POSTGRES_DB: ${POSTGRES_DB:-sanotour}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sanotour}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: uzwellness-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: uzwellness-api
    env_file: .env
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:-postgresql+asyncpg://sanotour:sanotour@postgres:5432/sanotour}
      REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    command:
      - sh
      - -c
      - "alembic upgrade head && python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*"

volumes:
  pg_data:
  redis_data:
